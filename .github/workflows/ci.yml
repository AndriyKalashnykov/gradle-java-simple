# This workflow will build a Java project with Gradle
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:
    - name: Download repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: 21
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      # Cache Gradle dependencies and build outputs to speed up future builds
    - name: Cache Gradle and build outputs
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
      with:
        path:
          ~/.gradle/caches
          ~/.gradle/wrapper
          build
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: ${{ runner.os }}-gradle-

    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@0723195856401067f7a2779048b490ace7a47d7c # v5

    - uses: sfesenko/setup-sdkman@c360e935fffb3cfa33eddd5748464329240cfd89 # v1
    - run: |
        source ~/.sdkman/bin/sdkman-init.sh

    - name: Build
      run: make clean build

    - name: Lint
      run: make lint

    - name: Test
      run: make test

    - name: Verify code coverage meets minimum threshold ( > 60%)
      run: make coverage-check

    - name: Run
      run: make run

  docker:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
    - name: Download repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

    - name: Build Docker image
      run: make docker-build

    - name: Login to Docker Registry
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DOCKER_REGISTRY != ''
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
      with:
        registry: ${{ vars.DOCKER_REGISTRY }}
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DOCKER_REGISTRY != ''
      run: make docker-push DOCKER_REGISTRY=${{ vars.DOCKER_REGISTRY }} DOCKER_REPO=${{ vars.DOCKER_REPO }} DOCKER_TAG=${{ github.sha }}
