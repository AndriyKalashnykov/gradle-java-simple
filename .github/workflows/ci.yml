# CI pipeline: lint, test, coverage, build, run, and Docker image build/push

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_call:

permissions:
  contents: read
  pull-requests: read   # dorny/paths-filter listFiles() on PR events

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Detect code changes
      uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
      id: filter
      with:
        filters: |
          code:
            - '!(**.md|docs/**|specs/**|LICENSE|.gitignore|.claudeignore|.claude/**|benchmarks/**|**.png|**.jpg|**.gif|**.svg)'
            - 'CLAUDE.md'
            # Re-include gated diagram sources: docs/** is excluded above, but
            # docs/diagrams/*.puml is validated by `make diagrams-check` inside
            # static-check — a .puml-only change must still trigger the pipeline.
            - 'docs/diagrams/**/*.puml'

  static-check:
    needs: [changes]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        fetch-depth: 0   # gitleaks scans full git history

    - name: Set up mise
      uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      with:
        install: true
        cache: true

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      with:
        cache-read-only: true
        build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
        build-scan-terms-of-use-agree: 'yes'

    - name: Static check
      run: make static-check

  build:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Set up mise
      uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      with:
        install: true
        cache: true

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      with:
        cache-read-only: true
        build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
        build-scan-terms-of-use-agree: 'yes'

    - name: Build
      run: make build

    - name: Run
      run: make run

  integration-test:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Set up mise
      uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      with:
        install: true
        cache: true

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      with:
        cache-read-only: true
        build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
        build-scan-terms-of-use-agree: 'yes'

    - name: Integration test
      run: make integration-test

  test:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Set up mise
      uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      with:
        install: true
        cache: true

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      with:
        cache-read-only: true
        build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
        build-scan-terms-of-use-agree: 'yes'

    # `make test` runs the FIPS-focused subset (FIPSValidatorTest only).
    - name: Test
      run: make test

    # coverage-generate runs the full suite (FIPSValidatorTest + AppTest) for
    # the threshold check; ci-mirror-check guards this test→coverage sequence.
    - name: Coverage report
      run: make coverage-generate

    - name: Verify coverage
      run: make coverage-check

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      continue-on-error: true
      with:
        name: test-results
        path: |
          app/build/test-results/
          app/build/reports/tests/
        retention-days: 14

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      continue-on-error: true
      with:
        name: coverage-report
        path: |
          app/build/reports/jacoco/
        retention-days: 14

  docker:
    needs: [changes, static-check, build, test, integration-test]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      SCAN_IMAGE: local/gradle-java-fips-test:scan

    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
      with:
        images: ghcr.io/${{ github.repository }}/gradle-java-fips-test
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=ref,event=branch
          type=sha,prefix=sha-
        flavor: |
          latest=${{ startsWith(github.ref, 'refs/tags/') }}

    - name: Build image for scan
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
      with:
        context: .
        load: true
        push: false
        platforms: linux/amd64
        tags: ${{ env.SCAN_IMAGE }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false
        sbom: false

    - name: Trivy image scan
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        image-ref: ${{ env.SCAN_IMAGE }}
        scanners: 'vuln,secret,misconfig'
        severity: CRITICAL,HIGH
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: os,library

    - name: Smoke test
      run: make image-smoke-test IMAGE=${{ env.SCAN_IMAGE }}

    - name: Log in to GHCR
      if: startsWith(github.ref, 'refs/tags/')
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      id: push
      if: startsWith(github.ref, 'refs/tags/')
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
      with:
        context: .
        push: true
        platforms: linux/amd64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false
        sbom: false

    - name: Install cosign
      if: startsWith(github.ref, 'refs/tags/')
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    - name: Sign image with cosign
      if: startsWith(github.ref, 'refs/tags/')
      env:
        TAGS: ${{ steps.meta.outputs.tags }}
        DIGEST: ${{ steps.push.outputs.digest }}
      run: |
        set -euo pipefail
        while IFS= read -r tag; do
          [ -z "$tag" ] && continue
          cosign sign --yes "${tag}@${DIGEST}"
        done <<< "${TAGS}"

  ci-pass:
    if: always()
    needs: [changes, static-check, build, test, integration-test, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Verify all required jobs passed
      run: |
        if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
          echo "One or more required jobs failed."
          exit 1
        fi
        if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
          echo "One or more required jobs were cancelled."
          exit 1
        fi
        echo "All required jobs passed (or were skipped)."
