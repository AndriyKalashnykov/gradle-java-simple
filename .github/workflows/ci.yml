# CI pipeline: lint, test, coverage, build, run, and Docker image build/push

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_call:

permissions:
  contents: read
  pull-requests: read   # dorny/paths-filter listFiles() on PR events

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Detect code changes
      uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
      id: filter
      with:
        filters: |
          code:
            - '!(**.md|docs/**|specs/**|LICENSE|.gitignore|.claudeignore|.claude/**|benchmarks/**|**.png|**.jpg|**.gif|**.svg)'
            - 'CLAUDE.md'

  static-check:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0   # gitleaks scans full git history

    - name: Set up toolchain (mise)
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      with:
        install: true
        cache: true

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
      with:
        cache-read-only: true
        build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
        build-scan-terms-of-use-agree: 'yes'

    - name: Static check
      run: make static-check

  build:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up toolchain (mise)
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      with:
        install: true
        cache: true

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
      with:
        cache-read-only: true
        build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
        build-scan-terms-of-use-agree: 'yes'

    - name: Build
      run: make build

    - name: Run
      run: make run

  integration-test:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up toolchain (mise)
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      with:
        install: true
        cache: true

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
      with:
        cache-read-only: true
        build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
        build-scan-terms-of-use-agree: 'yes'

    - name: Integration test
      run: make integration-test

  test:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up toolchain (mise)
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      with:
        install: true
        cache: true

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
      with:
        cache-read-only: true
        build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
        build-scan-terms-of-use-agree: 'yes'

    - name: Test
      run: make test

    - name: Verify coverage
      run: make coverage-check

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      continue-on-error: true
      with:
        name: test-results
        path: |
          app/build/test-results/
          app/build/reports/tests/
        retention-days: 14

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      continue-on-error: true
      with:
        name: coverage-report
        path: |
          app/build/reports/jacoco/
        retention-days: 14

  docker:
    needs: [changes, build, test, integration-test]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      SCAN_IMAGE: local/gradle-java-fips-test:scan

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
      with:
        images: ghcr.io/${{ github.repository }}/gradle-java-fips-test
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=ref,event=branch
          type=sha,prefix=sha-
        flavor: |
          latest=${{ startsWith(github.ref, 'refs/tags/') }}

    - name: Build image for scan
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
      with:
        context: .
        load: true
        push: false
        platforms: linux/amd64
        tags: ${{ env.SCAN_IMAGE }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false
        sbom: false

    - name: Trivy image scan
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
      with:
        image-ref: ${{ env.SCAN_IMAGE }}
        scanners: 'vuln,secret,misconfig'
        severity: CRITICAL,HIGH
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: os,library

    - name: Smoke test
      run: make image-smoke-test IMAGE=${{ env.SCAN_IMAGE }}

    - name: Log in to GHCR
      if: startsWith(github.ref, 'refs/tags/')
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      id: push
      if: startsWith(github.ref, 'refs/tags/')
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
      with:
        context: .
        push: true
        platforms: linux/amd64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false
        sbom: false

    - name: Install cosign
      if: startsWith(github.ref, 'refs/tags/')
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

    - name: Sign image with cosign
      if: startsWith(github.ref, 'refs/tags/')
      env:
        TAGS: ${{ steps.meta.outputs.tags }}
        DIGEST: ${{ steps.push.outputs.digest }}
      run: |
        set -euo pipefail
        while IFS= read -r tag; do
          [ -z "$tag" ] && continue
          cosign sign --yes "${tag}@${DIGEST}"
        done <<< "${TAGS}"

  ci-pass:
    if: always()
    needs: [changes, static-check, build, test, integration-test, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Verify all required jobs passed
      run: |
        if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
          echo "One or more required jobs failed or were cancelled."
          exit 1
        fi
        echo "All required jobs passed (or were skipped)."
